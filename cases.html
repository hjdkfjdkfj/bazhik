<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Бажик - Баранокейсы</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a0f1a 0%, #2a1a2a 100%);
            min-height: 100vh;
        }
        .cases-page { padding: 20px; min-height: 100vh; }
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            background: rgba(10,15,26,0.6);
            backdrop-filter: blur(20px);
            border-radius: 60px;
            padding: 12px 24px;
            border: 1px solid rgba(255,170,102,0.3);
        }
        .back-btn {
            background: rgba(255,170,51,0.2);
            border: 1px solid #ffaa66;
            padding: 8px 20px;
            border-radius: 40px;
            color: #ffaa66;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
        }
        .page-title {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .page-title h1 { font-size: 1.3rem; color: #ffaa66; }
        .currency-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0,0,0,0.4);
            padding: 6px 16px;
            border-radius: 40px;
        }
        .currency-badge img { width: 28px; height: 28px; }
        .currency-badge span { font-weight: 700; color: #ffd966; font-size: 1.2rem; }
        .rarity-info {
            text-align: center;
            margin-bottom: 25px;
            padding: 12px;
            background: rgba(0,0,0,0.3);
            border-radius: 40px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }
        .rarity-common {
            color: #6c757d;
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            background: rgba(108,117,125,0.2);
            margin: 0 5px;
            border: 1px solid #6c757d;
        }
        .rarity-rare {
            color: #28a745;
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            background: rgba(40,167,69,0.2);
            margin: 0 5px;
            border: 1px solid #28a745;
        }
        .cases-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            max-width: 900px;
            margin: 0 auto;
        }
        .case-card {
            background: linear-gradient(135deg, rgba(50,40,60,0.9), rgba(40,30,50,0.7));
            border-radius: 48px;
            padding: 30px;
            text-align: center;
            border: 1px solid rgba(255,170,102,0.4);
            backdrop-filter: blur(10px);
            width: 280px;
            transition: transform 0.2s;
        }
        .case-card:hover { transform: translateY(-5px); }
        .case-card.golden {
            background: linear-gradient(135deg, rgba(80,60,40,0.9), rgba(60,40,20,0.7));
            border: 2px solid #ffd700;
            box-shadow: 0 0 20px rgba(255,215,0,0.3);
        }
        .case-image {
            width: 180px;
            height: 180px;
            object-fit: contain;
            margin-bottom: 20px;
            filter: drop-shadow(0 15px 25px rgba(0,0,0,0.4));
            animation: float 3s infinite ease-in-out;
        }
        .golden .case-image { animation: float 3s infinite ease-in-out, goldenGlow 2s infinite; }
        @keyframes goldenGlow {
            0%, 100% { filter: drop-shadow(0 0 5px #ffd700); }
            50% { filter: drop-shadow(0 0 20px #ffaa33); }
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
        .case-card h2 { font-size: 1.4rem; margin-bottom: 10px; }
        .case-card p { color: rgba(255,255,255,0.6); font-size: 0.8rem; margin-bottom: 15px; }
        .case-price {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .case-price img { width: 24px; height: 24px; }
        .open-case-btn {
            background: linear-gradient(135deg, #ffaa33, #ff8800);
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            width: 100%;
        }
        .golden .open-case-btn { background: linear-gradient(135deg, #ffd700, #ffaa33); color: #1a1a2e; }
        .case-stats-container { max-width: 600px; margin: 30px auto 0; }
        .case-stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            padding: 15px;
            background: rgba(0,0,0,0.3);
            border-radius: 60px;
            flex-wrap: wrap;
        }
        .case-stats .stat-item { text-align: center; }
        .case-stats .stat-label { display: block; font-size: 0.7rem; color: rgba(255,255,255,0.6); }
        .case-stats .stat-value { font-size: 1.2rem; font-weight: 800; color: #ffd966; }
        @media (max-width: 700px) {
            .case-card { width: 260px; padding: 20px; }
            .case-image { width: 140px; height: 140px; }
        }
    </style>
</head>
<body>
    <div class="cases-page">
        <div class="page-header">
            <a href="game.html" class="back-btn">← НАЗАД</a>
            <div class="page-title">
                <span>🎁</span>
                <h1>БАРАНОКЕЙСЫ</h1>
                <span>🎁</span>
            </div>
            <div class="currency-badge">
                <img src="images/бажичок.png" alt="💰">
                <span id="currencyDisplay">0</span>
            </div>
        </div>

        <div class="rarity-info">
            <span class="rarity-common">⚪ ОБЫЧНЫЕ (серая рамка)</span>
            <span>→ 90% в обычном, 80% в золотом</span>
            <span style="margin: 0 10px">|</span>
            <span class="rarity-rare">🟢 РЕДКИЕ (зеленая рамка)</span>
            <span>→ 10% в обычном, 20% в золотом</span>
            <br>
            <span style="font-size: 0.7rem;">⭐ Золотой кейс дает 2 дубликата вместо 1!</span>
        </div>

        <div class="cases-grid">
            <div class="case-card">
                <img src="images/баранокейс.png" class="case-image">
                <h2>📦 ОБЫЧНЫЙ КЕЙС</h2>
                <p>1 дубликат • 10% на редкого</p>
                <div class="case-price">
                    <img src="images/бажичок.png" alt="💰">
                    <span id="normalCasePrice">150</span>
                </div>
                <button id="openNormalCaseBtn" class="open-case-btn">🎲 ОТКРЫТЬ КЕЙС</button>
            </div>

            <div class="case-card golden">
                <img src="images/золотойбаранокейс.png" class="case-image">
                <h2>⭐ ЗОЛОТОЙ КЕЙС ⭐</h2>
                <p>2 дубликата • 20% на редкого</p>
                <div class="case-price">
                    <img src="images/бажичок.png" alt="💰">
                    <span id="goldenCasePrice">500</span>
                </div>
                <button id="openGoldenCaseBtn" class="open-case-btn">✨ ОТКРЫТЬ ЗОЛОТОЙ КЕЙС ✨</button>
            </div>
        </div>
        
        <div id="caseStats" class="case-stats-container"></div>
    </div>

    <script src="scripts/main.js"></script>
    <script src="scripts/cases.js"></script>
</body>
</html>
