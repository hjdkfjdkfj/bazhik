<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Бажик - Мои баранчики</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a1f1a 0%, #1a3a2a 100%);
            min-height: 100vh;
        }
        .brawlers-page {
            padding: 20px;
            min-height: 100vh;
        }
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            background: rgba(10,15,26,0.6);
            backdrop-filter: blur(20px);
            border-radius: 60px;
            padding: 12px 24px;
            border: 1px solid rgba(255,215,0,0.2);
        }
        .back-btn {
            background: rgba(255,170,51,0.2);
            border: 1px solid #ffaa33;
            padding: 8px 20px;
            border-radius: 40px;
            color: #ffaa33;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
        }
        .page-title {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .page-title h1 {
            font-size: 1.3rem;
            color: #ffd966;
        }
        .currency-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0,0,0,0.4);
            padding: 6px 16px;
            border-radius: 40px;
        }
        .currency-badge img {
            width: 28px;
            height: 28px;
        }
        .currency-badge span {
            font-weight: 700;
            color: #ffd966;
            font-size: 1.2rem;
        }
        .rarity-info-header {
            text-align: center;
            margin-bottom: 25px;
            padding: 12px;
            background: rgba(0,0,0,0.3);
            border-radius: 40px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }
        .rarity-common-badge {
            color: #6c757d;
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            background: rgba(108,117,125,0.2);
            margin: 0 5px;
            border: 1px solid #6c757d;
        }
        .rarity-rare-badge {
            color: #28a745;
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            background: rgba(40,167,69,0.2);
            margin: 0 5px;
            border: 1px solid #28a745;
        }
        .brawlers-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            padding: 20px;
        }
        .brawler-card {
            background: linear-gradient(135deg, rgba(40,50,60,0.9), rgba(30,40,50,0.7));
            border-radius: 28px;
            padding: 20px;
            width: 280px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(10px);
            position: relative;
        }
        .brawler-card.common {
            border: 3px solid #6c757d;
            box-shadow: 0 0 10px rgba(108,117,125,0.2);
        }
        .brawler-card.rare {
            border: 3px solid #28a745;
            box-shadow: 0 0 15px rgba(40,167,69,0.3);
        }
        .brawler-card.selected {
            transform: translateY(-5px);
            box-shadow: 0 0 25px rgba(255,215,0,0.5);
            border-color: #ffd966 !important;
        }
        .brawler-card.locked {
            opacity: 0.7;
            cursor: default;
        }
        .brawler-img {
            width: 110px;
            height: 110px;
            object-fit: contain;
            margin-bottom: 12px;
        }
        .brawler-name {
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 5px;
        }
        .common .brawler-name { color: #adb5bd; }
        .rare .brawler-name { color: #28a745; }
        .rarity-text {
            font-size: 0.7rem;
            margin-bottom: 8px;
            font-weight: 600;
        }
        .common .rarity-text { color: #6c757d; }
        .rare .rarity-text { color: #28a745; }
        .brawler-level {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.6);
            margin: 8px 0;
        }
        .max-level-text { color: #ffaa33; font-weight: 700; }
        .brawler-bonus {
            font-size: 0.7rem;
            color: #6bb86b;
            font-weight: 600;
            margin: 5px 0;
        }
        .progress-container {
            margin: 15px 0;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
        }
        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            color: #ffaa66;
            margin-bottom: 6px;
        }
        .progress-bar-bg {
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            height: 12px;
            overflow: hidden;
            margin-bottom: 12px;
        }
        .progress-bar-fill {
            background: linear-gradient(90deg, #ffaa33, #ffd966);
            height: 100%;
            border-radius: 10px;
            transition: width 0.3s ease;
        }
        .upgrade-cost-info {
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            padding: 8px;
            margin-bottom: 12px;
        }
        .cost-item {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            color: rgba(255,255,255,0.7);
            padding: 3px 0;
        }
        .cost-value { color: #ffaa66; font-weight: bold; }
        .upgrade-btn {
            background: linear-gradient(135deg, #ffaa33, #ff8800);
            border: none;
            padding: 10px;
            border-radius: 30px;
            color: #1a1a2e;
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            font-family: inherit;
        }
        .brawler-max-achieved {
            margin-top: 10px;
            padding: 8px;
            background: rgba(255,170,51,0.2);
            border-radius: 20px;
            font-size: 0.7rem;
            color: #ffaa33;
        }
        .final-bonus {
            margin-top: 10px;
            padding: 8px;
            background: rgba(255,170,51,0.2);
            border-radius: 20px;
            font-size: 0.8rem;
            color: #ffaa33;
        }
        .max-level-badge {
            position: absolute;
            top: -10px;
            right: -10px;
            background: linear-gradient(135deg, #ffaa33, #ff8800);
            border-radius: 30px;
            padding: 4px 8px;
            font-size: 0.7rem;
            font-weight: 800;
            color: #1a1a2e;
            animation: pulse 1s infinite;
        }
        .brawler-image-wrapper {
            position: relative;
            margin-bottom: 12px;
            display: inline-block;
        }
        .locked-img {
            filter: grayscale(0.7) blur(3px);
            opacity: 0.5;
        }
        .lock-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2rem;
            pointer-events: none;
        }
        .unlock-hint {
            margin-top: 8px;
            font-size: 0.65rem;
            color: #ffaa66;
        }
        .info-message {
            text-align: center;
            padding: 20px;
            color: rgba(255,255,255,0.5);
            font-size: 0.8rem;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }
        @media (max-width: 600px) {
            .brawler-card { width: 220px; padding: 15px; }
            .brawler-img { width: 80px; height: 80px; }
        }
    </style>
</head>
<body>
    <div class="brawlers-page">
        <div class="page-header">
            <a href="game.html" class="back-btn">← НАЗАД</a>
            <div class="page-title">
                <span>⭐</span>
                <h1>МОИ БАРАНЧИКИ</h1>
                <span>⭐</span>
            </div>
            <div class="currency-badge">
                <img src="images/бажичок.png" alt="💰">
                <span id="currencyDisplay">0</span>
            </div>
        </div>

        <div class="rarity-info-header">
            <span class="rarity-common-badge">⚪ ОБЫЧНЫЕ</span>
            <span>→ серая рамка, стандартный бонус</span>
            <br>
            <span class="rarity-rare-badge">🟢 РЕДКИЕ</span>
            <span>→ зеленая рамка, х2 монет за клик!</span>
        </div>

        <div class="brawlers-grid" id="brawlersGrid">
            <div style="text-align: center; width: 100%; padding: 50px;">Загрузка...</div>
        </div>
        
        <div class="info-message">
            <p>✨ Нажми на баранчика, чтобы выбрать его ✨</p>
            <p>🔒 Заблокированных баранчиков можно получить из кейсов!</p>
            <p>💚 Редкие баранчики дают ВДВОЕ больше монет за клик!</p>
        </div>
    </div>

    <script src="scripts/main.js"></script>
    <script src="scripts/brawlers.js"></script>
</body>
</html>
