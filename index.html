<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Бажик - Веселый Мексиканский Барашек</title>
    <link rel="stylesheet" href="бажик.css">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Patrick+Hand&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Фоновые декорации -->
    <div class="bg-pattern"></div>
    <div class="cactus-left">
        <div class="cactus-flower"></div>
    </div>
    <div class="cactus-right">
        <div class="cactus-flower"></div>
    </div>
    <div class="sun">
        <div class="sun-rays"></div>
    </div>
    
    <!-- Облака -->
    <div class="cloud cloud1"></div>
    <div class="cloud cloud2"></div>
    <div class="cloud cloud3"></div>
    <div class="cloud cloud4"></div>

    <!-- Летающие мексиканские украшения -->
    <div class="floating-decoration">
        <span class="floating-emoji">🪇</span>
        <span class="floating-emoji">🌮</span>
        <span class="floating-emoji">🎩</span>
        <span class="floating-emoji">🌵</span>
        <span class="floating-emoji">🎶</span>
    </div>

    <div class="container">
        <header>
            <div class="header-decoration">
                <span class="maraca left">🪇</span>
                <h1>🐏 БАЖИК 🐏</h1>
                <span class="maraca right">🪇</span>
            </div>
            <p class="subtitle">✦ EL REY DE LOS CORDEROS ✦</p>
            <div class="sombrero-icon">🎩🌵🎩</div>
        </header>

        <div class="stats-panel">
            <div class="stat-card">
                <div class="stat-icon">🐏</div>
                <div class="stat-info">
                    <span class="stat-label">Армия Бажиков</span>
                    <span id="sheepCount" class="stat-value">1</span>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🎉</div>
                <div class="stat-info">
                    <span class="stat-label">Всего кликов</span>
                    <span id="totalClicks" class="stat-value">0</span>
                </div>
            </div>
            <button id="resetButton" class="reset-btn">
                <span>🔄</span> Сбросить <span>🌵</span>
            </button>
        </div>

        <div id="sheepField" class="sheep-field">
            <!-- Барашки будут здесь -->
        </div>

        <div class="sound-control">
            <button id="muteButton" class="mute-btn">
                <span class="mute-icon">🔊</span>
                <span class="mute-text">Звуки</span>
            </button>
        </div>
        
        <footer>
            <div class="footer-decoration">
                <span>🌮</span>
                <p>✨ Нажми на барашка — стадо УДВАИВАЕТСЯ! ✨</p>
                <span>🌮</span>
            </div>
            <p class="credit">💚 Бажик — самый веселый барашек в Мексике 🎶</p>
        </footer>
    </div>

    <script src="бажик.js"></script>
</body>
</html>
