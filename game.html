<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Бажик - Игра</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0f1a 0%, #1a2a2a 100%);
            min-height: 100vh;
        }
        .game-container {
            min-height: 100vh;
            padding: 20px;
        }
        .game-content {
            max-width: 600px;
            margin: 0 auto;
        }
        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            background: rgba(10,15,26,0.6);
            backdrop-filter: blur(20px);
            border-radius: 60px;
            padding: 12px 24px;
            border: 1px solid rgba(255,215,0,0.2);
        }
        .back-btn {
            background: rgba(255,170,51,0.2);
            border: 1px solid #ffaa33;
            padding: 8px 20px;
            border-radius: 40px;
            color: #ffaa33;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
        }
        .currency-header {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0,0,0,0.4);
            padding: 6px 16px;
            border-radius: 40px;
        }
        .currency-header img {
            width: 28px;
            height: 28px;
        }
        .currency-header span {
            font-size: 1.3rem;
            font-weight: 700;
            color: #ffd966;
        }
        .hero-area {
            background: linear-gradient(135deg, rgba(30,40,50,0.8), rgba(20,30,40,0.6));
            border-radius: 60px;
            padding: 40px;
            text-align: center;
            margin-bottom: 30px;
            border: 1px solid rgba(255,215,0,0.3);
            position: relative;
            overflow: hidden;
        }
        .clickable-sheep {
            cursor: pointer;
            transition: transform 0.1s;
            display: inline-block;
            position: relative;
        }
        .click-ripple {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            pointer-events: none;
        }
        .click-ripple.active {
            animation: rippleEffect 0.4s ease-out;
        }
        @keyframes rippleEffect {
            0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.8; box-shadow: 0 0 0 0 rgba(255,215,0,0.8); }
            100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0; box-shadow: 0 0 0 30px rgba(255,215,0,0); }
        }
        .hero-image {
            width: 260px;
            height: auto;
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.5));
        }
        .hero-info {
            margin-top: 20px;
        }
        .hero-name {
            font-size: 1.2rem;
            font-weight: 600;
            color: #ffd966;
        }
        .hero-bonus {
            font-size: 0.9rem;
            color: #6bb86b;
        }
        .hero-rarity {
            font-size: 0.7rem;
            margin-top: 5px;
        }
        .hero-rarity.common { color: #6c757d; }
        .hero-rarity.rare { color: #28a745; }
        .stats-row {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .stat-box {
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            border-radius: 60px;
            padding: 12px 24px;
            text-align: center;
            flex: 1;
            max-width: 200px;
            border: 1px solid rgba(255,215,0,0.2);
        }
        .stat-label {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.6);
        }
        .stat-number {
            font-size: 1.5rem;
            font-weight: 700;
            color: #ffd966;
        }
        .action-buttons {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }
        .action-btn {
            flex: 1;
            background: linear-gradient(135deg, #ffaa33, #ff8800);
            border: none;
            padding: 14px;
            border-radius: 60px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
            color: #1a1a2e;
        }
        .action-btn.secondary {
            background: rgba(255,170,51,0.2);
            color: #ffaa33;
            border: 1px solid #ffaa33;
        }
        .reset-btn {
            background: rgba(100,50,30,0.3);
            border: 1px solid rgba(255,100,50,0.5);
            padding: 12px;
            border-radius: 40px;
            width: 100%;
            font-family: inherit;
            color: #ffaa66;
            cursor: pointer;
        }
        .info-text {
            margin-top: 30px;
            text-align: center;
            color: rgba(255,255,255,0.3);
            font-size: 0.7rem;
        }
        @media (max-width: 600px) {
            .hero-image { width: 200px; }
            .stat-number { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="game-content">
            <div class="top-nav">
                <a href="index.html" class="back-btn">← В МЕНЮ</a>
                <div class="currency-header">
                    <img src="images/бажичок.png" alt="Бажичок">
                    <span id="currencyAmount">0</span>
                </div>
            </div>

            <div class="hero-area">
                <div id="clickableSheep" class="clickable-sheep">
                    <img id="mainSheepImage" src="images/бажичек.png" class="hero-image">
                    <div class="click-ripple"></div>
                </div>
                <div class="hero-info">
                    <div class="hero-name" id="activeBrawlerName">Обычный Бажик</div>
                    <div class="hero-bonus" id="activeBrawlerBonus">+1 за клик</div>
                    <div class="hero-rarity" id="activeBrawlerRarity">☆ ОБЫЧНЫЙ ☆</div>
                </div>
                <div class="click-hint">👇 НАЖМИ НА БАЖИКА! 👇</div>
            </div>

            <div class="stats-row">
                <div class="stat-box">
                    <div class="stat-label">ВСЕГО КЛИКОВ</div>
                    <div class="stat-number" id="totalClicks">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">БОНУС ЗА КЛИК</div>
                    <div class="stat-number" id="clickBonus">1</div>
                </div>
            </div>

            <div class="action-buttons">
                <button id="openBrawlersBtn" class="action-btn secondary">
                    <span>⭐</span> БАРАНЧИКИ
                </button>
                <button id="openCasesBtn" class="action-btn secondary">
                    <span>🎁</span> КЕЙСЫ
                </button>
            </div>

            <button id="resetGameBtn" class="reset-btn">
                <span>🔄</span> СБРОСИТЬ ПРОГРЕСС
            </button>

            <div class="info-text">
                <p>✨ Нажми на Бажика, чтобы получить Бажички! ✨</p>
                <p>🎁 Кейсы: обычный (150💰, 1 дубль) | золотой (500💰, 2 дубля)</p>
                <p>💚 Редкие барашки дают x2 монет за клик!</p>
            </div>
        </div>
    </div>
    
    <div id="particles"></div>

    <script src="scripts/main.js"></script>
    <script src="scripts/game.js"></script>
</body>
</html>
